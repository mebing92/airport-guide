<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공병 구매 안내</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
}

/* 타이틀 */
.title {
  background: #2f5d8c;
  color: white;
  padding: 15px;
  font-size: 18px;
}

/* 안내 박스 */
.info {
  background: #3d7edb;
  color: white;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  font-size: 14px;
  line-height: 1.6;
}

/* 카드 */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 강조 카드 */
.highlight {
  border: 3px solid gold;
}

/* 버튼 */
.move-btn {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: white;
  padding: 12px;
  border-radius: 30px;
  margin: 10px 0;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 이미지 */
img {
  width: 100%;
  border-radius: 15px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="title">🧴 공병 구매 안내</div>

<div class="info">
💡 100ml 이하 공병 구매 후 나누어 담으면<br>
기내 반입 가능<br>
👉 구매 후 출발장 진입시 재검색 진행
</div>

<!-- ⭐ 럭키박스 -->
<div class="card highlight">
  <h3>🎁 2층 럭키박스</h3>
  <div>운영시간: 07:00 ~ 21:00</div>

  <div class="move-btn">⭐ 가장 가까운 매장 </div>

  <img src="luckybox.jpg">
  <img src="map2.jpg">
</div>

<!-- 편의점 -->
<div class="card">
  <h3>🏪 1층 편의점 (이마트24)</h3>
  <div>운영시간: 05:00 ~ 22:00</div>

  <img src="emart24.jpg">
  <img src="map1.jpg">
</div>

<div style="margin:20px;">
<a href="index.html">← 돌아가기</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보관소 이용</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background:#1f4e79;
    color:white;
    padding:20px;
    font-size:22px;
}

/* ⚠️ 경고 */
.warning {
    background:#ffe5e5;
    margin:15px;
    padding:20px;
    border-radius:15px;
    font-size:16px;
    line-height:1.6;
    font-weight:bold;
}

/* 💡 안내 */
.info {
    background:#fff3cd;
    margin:15px;
    padding:18px;
    border-radius:15px;
    font-size:15px;
}

/* 🚨 행동 */
.action {
    background:#ff4d4d;
    color:white;
    padding:18px;
    margin:15px;
    border-radius:15px;
    font-weight:bold;
}

/* 카드 */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* 라벨 */
.label {
    font-size:14px;
    font-weight:bold;
    color:#1f4e79;
    margin-top:10px;
}

/* 뒤로가기 */
.back {
    display: block;
    margin: 20px;
    color: #2d89ef;
    text-decoration: none;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="header">📦 보관소 이용</div>

<!-- ⚠️ 핵심 경고 -->
<div class="warning">
⚠️ 보관소는 유료로 운영됩니다<br>
⚠️ 왕복 이동 시 약 20~30분 소요됩니다<br>
⚠️ 국내선 도착장 방향에 위치해 있습니다
</div>

<!-- 💡 안내 -->
<div class="info">
💡 시간이 충분한 경우에만 이용을 권장드립니다<br>
👉 급한 경우 다른 방법을 먼저 고려해 주세요
</div>

<!-- 🚨 행동 -->
<div class="action">
👉 보관소 이용 후 즉시 재검색 진행
</div>

<!-- 📍 위치 -->
<div class="card">
<h3>🏢 사설 보관소</h3>
<p>운영시간: 05:00 ~ 20:00</p>

<div class="label">📸 위치 사진</div>
<img src="storage.jpg" alt="보관소 위치 사진">

<div class="label">🗺️ 위치 지도</div>
<img src="storage_map.jpg" alt="보관소 위치 지도">
</div>

<!-- 💰 요금표 -->
<div class="card">
<h3>💰 보관소 이용 요금</h3>

<div class="label">📊 요금표 안내</div>
<img src="price.jpg" alt="보관소 요금표">

<p style="font-size:13px; margin-top:10px; color:#666;">
⚠️ 위의 요금표는 참고용 입니다.<br>
정확한 요금은 매장에서 확인해 주세요
</p>
</div>

<a class="back" href="index.html">← 돌아가기</a>

</body>
</html>

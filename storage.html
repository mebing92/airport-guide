<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보관소 이용</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
}

/* 상단 타이틀 */
.title {
  background: #2f5d8c;
  color: white;
  padding: 18px;
  font-size: 20px;
}

/* 기본 카드 */
.card {
  background: white;
  margin: 15px;
  padding: 18px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* 경고 박스 */
.alert {
  background: #f8d7da;
  padding: 15px;
  margin: 15px;
  border-radius: 15px;
  font-size: 14px;
}

/* 안내 박스 */
.info {
  background: #fff3cd;
  padding: 15px;
  margin: 15px;
  border-radius: 15px;
  font-size: 14px;
}

/* 🔥 강조 행동 박스 */
@keyframes softBlink {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,0,0,0); }
  50% { transform: scale(1.03); box-shadow: 0 0 10px rgba(255,0,0,0.2); }
  100% { transform: scale(1); box-shadow: 0 0 0 rgba(255,0,0,0); }
}

.highlight-action {
  margin-top:10px;
  padding:12px;
  background:#fff3cd;
  border-radius:12px;
  font-weight:bold;
  animation: softBlink 2s infinite;
}

/* 이미지 */
img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* 돌아가기 */
.back {
  display: block;
  margin: 20px;
  text-decoration: none;
  color: #6c63ff;
}
</style>
</head>

<body>

<div class="title">📦 보관소 이용</div>

<!-- 🚨 주요 안내 -->
<div class="alert">
⚠️ 보관소는 유료로 운영됩니다<br>
⚠️ 왕복 이동 시 약 20~30분 소요됩니다<br>
⚠️ 국내선 도착장 방향에 위치해 있습니다
</div>

<!-- 💡 안내 + 행동 합친 버전 -->
<div class="info">
💡 시간이 충분한 경우에만 이용을 권장드립니다<br>
👉 급한 경우 다른 방법을 먼저 고려해 주세요<br><br>

<div class="highlight-action">
🔁 보관 후 출발장 진입시 재검색 실시
</div>
</div>

<!-- 📍 보관소 정보 -->
<div class="card">
<h3>🏢 사설 보관소</h3>
운영시간: 05:00 ~ 20:00

<p>📸 위치 사진</p>
<img src="storage.jpg">

<p>🗺️ 위치 지도</p>
<img src="map_storage.jpg">
</div>

<!-- 💰 요금 -->
<div class="card">
<h3>💰 보관소 이용 요금</h3>

<img src="price.jpg">

<p style="font-size:13px; color:#666;">
⚠️ 위의 요금표는 참고용입니다<br>
정확한 요금은 매장에서 확인해 주세요
</p>
</div>

<a href="index.html" class="back">← 돌아가기</a>

</body>
</html>

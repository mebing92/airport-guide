<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
document.addEventListener("DOMContentLoaded", function() {

  const sound = new Audio("beep.wav");

  const messages = {
    ko: "처리방법 선택 후\n보안검색요원에게 말씀해주세요",
    en: "Please select a handling option\nand inform the security staff",
    ja: "処理方法を選択後、\n保安係員にお知らせください",
    zh: "请选择处理方式，\n并告知安检人员"
  };

  // ✅ 버튼 다국어 추가
  const buttons = {
    ko: "확인",
    en: "OK",
    ja: "確認",
    zh: "确认"
  };

  const userLang = navigator.language || "en";
  let langKey = "en";

  if (userLang.startsWith("ko")) langKey = "ko";
  else if (userLang.startsWith("ja")) langKey = "ja";
  else if (userLang.startsWith("zh")) langKey = "zh";

  const popup = document.getElementById("popup");
  const popupText = document.getElementById("popup-text");
  const popupBtn = document.querySelector("#popup button");

  if (!localStorage.getItem("popupSeen") && popup && popupText) {
    popupText.innerText = messages[langKey];

    // ✅ 버튼 언어 변경
    if (popupBtn) popupBtn.innerText = buttons[langKey];

    if (navigator.vibrate) navigator.vibrate(100);
    sound.play().catch(()=>{});
  } else {
    if (popup) popup.style.display = "none";
  }

  window.closePopup = function() {
    popup.style.display = "none";
    localStorage.setItem("popupSeen", "true");

    if (navigator.vibrate) navigator.vibrate(50);
    sound.play().catch(()=>{});
  };

});
</script>

<title>Liquid Restriction</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; text-align:center; animation:fadeIn .5s ease;}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.lang-container { display:flex; gap:8px; padding:10px;}
.lang-container a {
flex:1; text-decoration:none; color:#333; padding:12px; border-radius:14px;
font-size:13px; display:flex; flex-direction:column; align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.kr{background:linear-gradient(#fff,#ffecec);}
.en{background:linear-gradient(#fff,#eaf2ff);}
.jp{background:linear-gradient(#fff,#fff0f5);}
.cn{background:linear-gradient(#fff,#fff4e5);}

.title { background:#2f5d8c; color:#fff; padding:15px; font-size:18px;}

.button {
display:block; background:#2f80ed; color:#fff; padding:18px; margin:15px 0;
border-radius:18px; text-decoration:none; font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,.15);
}
.button small{display:block;font-size:13px;margin-top:5px;}

.sub-text { background:#f2e6c9; margin:-8px 20px 15px; padding:12px; border-radius:12px; font-size:13px;}

.alert-box { background:#ff5c5c; color:#fff; margin:15px; padding:15px; border-radius:15px;}
</style>
</head>

<body>

<!-- 팝업 -->
<div id="popup" style="
position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:flex; justify-content:center; align-items:center;
z-index:9999;
">
  <div style="
  background:white; padding:25px; border-radius:20px;
  width:80%; max-width:320px; text-align:center;
  ">
    <div id="popup-text" style="font-size:16px; margin-bottom:20px; white-space:pre-line;"></div>

    <!-- ❗ 구조 그대로 유지, JS로만 변경 -->
    <button onclick="closePopup()" style="
    background:#2f80ed; color:white; border:none;
    padding:12px 20px; border-radius:12px; font-size:15px;">
      OK
    </button>

  </div>
</div>

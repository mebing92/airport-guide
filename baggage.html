<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수하물 위탁 안내</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
}

/* 상단 타이틀 */
.title {
  background: #2f5d8c;
  color: white;
  padding: 18px;
  font-size: 18px;
}

/* 공통 카드 */
.card {
  margin: 12px 16px;
  padding: 16px;
  border-radius: 16px;
  font-size: 14px;
}

/* 경고 카드 */
.warn {
  background: #f8dede;
}

/* 주의 카드 */
.caution {
  background: #efe2c6;
}

/* 강조 행동 버튼 */
.action {
  background: #ff5c5c;
  color: white;
  font-size: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* 정보 카드 */
.info {
  background: #ffffff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* 리스트 */
.list {
  margin-top: 10px;
  line-height: 1.8;
}

/* 뒤로가기 */
.back {
  display: inline-block;
  margin: 20px;
  padding: 12px 20px;
  background: #ddd;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
}
</style>
</head>

<body>

<div class="title">🧳 수하물 위탁 안내</div>

<!-- 요금 안내 -->
<div class="card warn">
  💰 추가요금이 발생할 수 있습니다<br>
  👉 요금은 항공사 체크인 카운터에 문의하세요
</div>

<!-- 재위탁 불가 -->
<div class="card warn">
  ❌ 이미 위탁한 수하물은 다시 꺼낼 수 없습니다<br>
  👉 새로운 수하물로 다시 위탁해야 합니다
</div>

<!-- 행동 유도 -->
<div class="card action">
  📍 이용 방법<br><br>
  ✈️ 항공사 체크인 카운터 이용 (1층)<br>
  👉 체크인 카운터에서 위탁 가능<br>
  ⏱ 소요시간: 약 5~10분
</div>

<!-- 금지 물품 -->
<div class="card info">
  ⚠️ 수하물 위탁 전 확인<br><br>
  아래 물품은 위탁수하물에 넣을 수 없습니다
  <div class="list">
    🔋 배터리 (보조배터리 포함)<br>
    🔥 라이터<br>
    💇‍♀️ 무선 고데기<br>
    🚬 전자담배
  </div>
</div>

<a href="index.html" class="back">← 돌아가기</a>

</body>
</html>

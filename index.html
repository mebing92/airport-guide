<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>액체류 반입 제한</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.lang-container {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.lang-container a {
  flex: 1;
  text-decoration: none;
  color: #333;
  padding: 12px;
  border-radius: 14px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.lang-container a.kr { background: linear-gradient(#fff,#ffecec);}
.lang-container a.en { background: linear-gradient(#fff,#eaf2ff);}
.lang-container a.jp { background: linear-gradient(#fff,#fff0f5);}
.lang-container a.cn { background: linear-gradient(#fff,#fff4e5);}

.title {
  background: #2f5d8c;
  color: white;
  padding: 15px;
  font-size: 18px;
}

.button {
  display: block;
  background: #2f80ed;
  color: white;
  padding: 18px;
  margin: 15px 0;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;

  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  transition: all 0.15s ease;
}

.button small {
  display: block;
  font-size: 13px;
  margin-top: 5px;
}

.sub-text {
  background: #f2e6c9;
  margin: -8px 20px 15px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
}

.alert-box {
  background: #ff5c5c;
  color: white;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 팝업 -->
<div id="popup" style="
position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:flex; justify-content:center; align-items:center;
z-index:9999;
">
  <div style="
  background:white; padding:25px; border-radius:20px;
  width:80%; max-width:320px; text-align:center;
  ">
    <div id="popup-text" style="font-size:16px; margin-bottom:20px; white-space:pre-line;"></div>

    <button onclick="closePopup()" style="
    background:#2f80ed; color:white; border:none;
    padding:12px 20px; border-radius:12px; font-size:15px;">
      확인
    </button>
  </div>
</div>

<div class="lang-container">
  <a href="index.html" class="kr">🇰🇷<br>한국어</a>
  <a href="index_en.html" class="en">🇺🇸<br>EN</a>
  <a href="index_jp.html" class="jp">🇯🇵<br>日本語</a>
  <a href="index_cn.html" class="cn">🇨🇳<br>中文</a>
</div>

<div class="title">🚫 액체류 반입 제한</div>

<a class="button" href="baggage.html">
🧳 수하물 위탁
<small>→ 물건 맡기고 탑승</small>
</a>
<div class="sub-text">
⏰ 출발 50분 전 이후에는 위탁이 어려울 수 있습니다<br>
👉 시간이 부족할 경우 보안검색요원에게 문의해주세요
</div>

<a class="button" href="bottle.html">
🧴 공병 구매
<small>→ 나눠 담아 기내 반입</small>
</a>
<div class="sub-text">
💧 초과 용액은 100ml 이하 공병에 나누어 담으면 기내 반입 가능합니다
</div>

<a class="button" href="storage.html">
📦 보관소 이용
<small>→ 물건 보관 후 출국</small>
</a>

<div class="alert-box">
🚨 출발장을 나갔다가 다시 들어올 경우 재검색 필요<br>
👉 줄 서지 말고 분홍색 라인 이동<br>
⚠️ 미이행 시 탑승 제한
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const sound = new Audio("beep.wav");

  const messages = {
    ko: "처리방법 선택 후\n보안검색요원에게 말씀해주세요",
    en: "Please select a handling option\nand inform the security staff",
    ja: "処理方法を選択後、\n保安係員にお知らせください",
    zh: "请选择处理方式，\n并告知安检人员"
  };

  const buttons = {
    ko: "확인",
    en: "OK",
    ja: "確認",
    zh: "确认"
  };

  const userLang = navigator.language || "ko";
  let langKey = "ko";

  if (userLang.startsWith("en")) langKey = "en";
  else if (userLang.startsWith("ja")) langKey = "ja";
  else if (userLang.startsWith("zh")) langKey = "zh";

  const popup = document.getElementById("popup");
  const popupText = document.getElementById("popup-text");
  const popupBtn = document.querySelector("#popup button");

  if (popup && popupText) {
    popupText.innerText = messages[langKey];
    if (popupBtn) popupBtn.innerText = buttons[langKey];

    if (navigator.vibrate) navigator.vibrate([120,50,120]);
    sound.play().catch(()=>{});
  }

  window.closePopup = function() {
    popup.style.display = "none";

    if (navigator.vibrate) navigator.vibrate(80);
    sound.play().catch(()=>{});
  };

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液体携带限制</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.lang-container {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.lang-container a {
  flex: 1;
  text-decoration: none;
  color: #333;
  padding: 12px;
  border-radius: 14px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.kr { background: linear-gradient(#fff,#ffecec);}
.en { background: linear-gradient(#fff,#eaf2ff);}
.jp { background: linear-gradient(#fff,#fff0f5);}
.cn { background: linear-gradient(#fff,#fff4e5);}

.title {
  background: #2f5d8c;
  color: white;
  padding: 15px;
  font-size: 18px;
}

.button {
  display: block;
  background: #2f80ed;
  color: white;
  padding: 18px;
  margin: 15px 0;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  animation: float 2.5s ease-in-out infinite;
}

.button small {
  display: block;
  font-size: 13px;
  margin-top: 5px;
}

.button:active {
  transform: scale(0.96);
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}

.sub-text {
  background: #f2e6c9;
  margin: -8px 20px 15px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
}

.alert-box {
  background: #ff5c5c;
  color: white;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="lang-container">
  <a href="index.html" class="kr">🇰🇷<br>한국어</a>
  <a href="index_en.html" class="en">🇺🇸<br>EN</a>
  <a href="index_jp.html" class="jp">🇯🇵<br>日本語</a>
  <a href="index_cn.html" class="cn">🇨🇳<br>中文</a>
</div>

<div class="title">🚫 液体携带限制</div>

<a class="button" href="baggage_cn.html">
🧳 托运行李
<small>→ 托运后登机</small>
</a>
<div class="sub-text">
⏰ 起飞前50分钟后可能无法办理托运<br>
👉 时间紧张请咨询工作人员
</div>

<a class="button" href="bottle_cn.html">
🧴 购买容器
<small>→ 分装后携带登机</small>
</a>
<div class="sub-text">
💧 超量液体可分装至100ml以下容器携带
</div>

<a class="button" href="storage_cn.html">
📦 行李寄存
<small>→ 寄存后出发</small>
</a>

<div class="alert-box">
🚨 离开后需重新安检<br>
👉 请沿粉色路线移动<br>
⚠️ 未遵守将限制登机
</div>

<script>
document.querySelectorAll('.button').forEach(btn=>{
btn.addEventListener('click',()=>{if(navigator.vibrate){navigator.vibrate(30);}});
});
</script>

</body>
</html>

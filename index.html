<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>액체류 반입 제한</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 언어 버튼 */
.lang-container {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.lang-container a {
  flex: 1;
  text-decoration: none;
  color: #333;
  padding: 12px;
  border-radius: 14px;
  font-size: 13px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.lang-container a.kr {
  background: linear-gradient(135deg, #ffffff, #ffecec);
}

.lang-container a.en {
  background: linear-gradient(135deg, #ffffff, #eaf2ff);
}

.lang-container a.jp {
  background: linear-gradient(135deg, #ffffff, #fff0f5);
}

.lang-container a.cn {
  background: linear-gradient(135deg, #ffffff, #fff4e5);
}

.lang-container a:active {
  transform: scale(0.95);
}

.lang-container a:hover {
  transform: translateY(-2px);
}

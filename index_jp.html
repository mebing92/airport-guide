<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液体持ち込み制限</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.lang-container {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.lang-container a {
  flex: 1;
  text-decoration: none;
  color: #333;
  padding: 12px;
  border-radius: 14px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.kr { background: linear-gradient(#fff,#ffecec);}
.en { background: linear-gradient(#fff,#eaf2ff);}
.jp { background: linear-gradient(#fff,#fff0f5);}
.cn { background: linear-gradient(#fff,#fff4e5);}

.title {
  background: #2f5d8c;
  color: white;
  padding: 15px;
  font-size: 18px;
}

.button {
  display: block;
  background: #2f80ed;
  color: white;
  padding: 18px;
  margin: 15px 0;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  animation: float 2.5s ease-in-out infinite;
}

.button small {
  display: block;
  font-size: 13px;
  margin-top: 5px;
}

.button:active {
  transform: scale(0.96);
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

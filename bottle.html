<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공병 구매 안내</title>

<style>
body {
    font-family: Arial;
    background:#f5f7fa;
    margin:0;
    text-align:center;
}

.header {
    background:#1f4e79;
    color:white;
    padding:20px;
    font-size:22px;
}

.solution {
    background:#2d89ef;
    color:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    font-size:17px;
    line-height:1.6;
}

.action {
    background:#ff4d4d;
    color:white;
    padding:18px;
    margin:15px;
    border-radius:15px;
    font-size:16px;
    font-weight:bold;
}

.card {
    background:white;
    border-radius:15px;
    padding:15px;
    margin:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

/* 라벨 */
.label {
    font-size:14px;
    font-weight:bold;
    color:#1f4e79;
    margin-top:10px;
}

/* 지도 강조 */
.map {
    border:2px solid #2d89ef;
}

.back {
    display:block;
    margin:20px;
    color:#2d89ef;
    text-decoration:none;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">🧴 공병 구매 안내</div>

<!-- 해결 -->
<div class="solution">
💡 100ml 이하 공병을 구매하여<br>
초과 액체를 나누어 담으면<br>
👉 기내 반입이 가능합니다
</div>

<!-- 행동 -->
<div class="action">
👉 구매 후 즉시 재검색 진행
</div>

<!-- 편의점 -->
<div class="card">
<h3>🏪 1층 편의점 (e마트24)</h3>
<p>운영시간: 05:00 ~ 22:00</p>

<div class="label">📸 매장 사진</div>
<img src="emart24.jpg">

<div class="label">🗺️ 매장 위치</div>
<img src="map1.jpg" class="map">
</div>

<!-- 럭키박스 -->
<div class="card">
<h3>🎁 2층 럭키박스</h3>
<p>운영시간: 07:00 ~ 21:00</p>

<div class="label">📸 매장 사진</div>
<img src="luckybox.jpg">

<div class="label">🗺️ 매장 위치</div>
<img src="map2.jpg" class="map">
</div>

<a class="back" href="index.html">← 돌아가기</a>

</body>
</html>
